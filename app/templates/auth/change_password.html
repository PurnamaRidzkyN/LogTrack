{% extends "layouts/app.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="max-w-md mx-auto">

  <h1 class="text-2xl font-bold mb-6">Change Password</h1>

  <div class="card bg-base-100 shadow-xl">
    <div class="card-body">

      <form method="POST" action="/change-password-post">

        <!-- OLD PASSWORD -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">Old Password</span>
          </label>
          <input type="password" name="old_password" class="input input-bordered w-full" required>
        </div>

        <!-- NEW PASSWORD -->
        <div class="form-control mb-4">
          <label class="label">
            <span class="label-text">New Password</span>
          </label>
          <input type="password" name="new_password" class="input input-bordered w-full" required>
        </div>

        <!-- CONFIRM -->
        <div class="form-control mb-6">
          <label class="label">
            <span class="label-text">Confirm Password</span>
          </label>
          <input type="password" name="confirm_password" class="input input-bordered w-full" required>
        </div>

        <button class="btn btn-primary w-full">Update Password</button>

      </form>

    </div>
  </div>

</div>

{% endblock %}
